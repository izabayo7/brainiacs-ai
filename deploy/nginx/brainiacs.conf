# Brainiacs AI — nginx reverse proxy for brainiacs.bwenge.rw
#
# Install:
#   sudo cp deploy/nginx/brainiacs.conf /etc/nginx/sites-available/brainiacs
#   sudo ln -sf /etc/nginx/sites-available/brainiacs /etc/nginx/sites-enabled/brainiacs
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# HTTPS (after DNS resolves + the app is up):
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d brainiacs.bwenge.rw -d www.brainiacs.bwenge.rw \
#                        -d api.brainiacs.bwenge.rw -d www.api.brainiacs.bwenge.rw

# --- Web app: brainiacs.bwenge.rw -> Next.js (127.0.0.1:3000) ---
server {
    listen 80;
    server_name brainiacs.bwenge.rw;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- API: api.brainiacs.bwenge.rw -> FastAPI (127.0.0.1:8000) ---
server {
    listen 80;
    server_name api.brainiacs.bwenge.rw;
    client_max_body_size 5m;
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- www -> apex redirects ---
server {
    listen 80;
    server_name www.brainiacs.bwenge.rw;
    return 301 https://brainiacs.bwenge.rw$request_uri;
}
server {
    listen 80;
    server_name www.api.brainiacs.bwenge.rw;
    return 301 https://api.brainiacs.bwenge.rw$request_uri;
}
