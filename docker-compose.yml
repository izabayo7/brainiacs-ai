# Brainiacs AI — full stack for StrangeCloud (Docker + Caddy).
# Copy .env.deploy.example -> .env and fill it in, then: docker compose up -d --build
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: brainiacs
      POSTGRES_PASSWORD: ${DB_PASSWORD:-brainiacs}
      POSTGRES_DB: brainiacs
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://brainiacs:${DB_PASSWORD:-brainiacs}@db:5432/brainiacs
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SYNC_SECRET: ${AUTH_SYNC_SECRET}
      FRONTEND_ORIGIN: ${APP_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
    depends_on:
      - db
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${API_URL}
    environment:
      NEXTAUTH_URL: ${APP_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SYNC_SECRET: ${AUTH_SYNC_SECRET}
      NEXT_PUBLIC_API_BASE_URL: ${API_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
