# Brainiacs AI — app stack (Docker Compose). Host nginx terminates TLS and reverse-proxies
# APP_DOMAIN -> web (:3000) and API_DOMAIN -> api (:8000). See DEPLOY.md + deploy/nginx/.
# The web + api ports bind to 127.0.0.1 so they're reachable only via nginx, not publicly.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: brainiacs
      POSTGRES_PASSWORD: ${DB_PASSWORD:-brainiacs}
      POSTGRES_DB: brainiacs
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://brainiacs:${DB_PASSWORD:-brainiacs}@db:5432/brainiacs
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_ORIGIN: ${APP_URL}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - db
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${API_URL}
    environment:
      NEXTAUTH_URL: ${APP_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_API_BASE_URL: ${API_URL}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
